<!DOCTYPE html>
<html>
<head>
<style>
  body {
    margin: 0;
    padding: 0;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
  }
  svg {
    width: 512px;
    height: 512px;
  }
</style>
</head>
<body>
<div id="logo-container">
<svg viewBox="20 0 140 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neon-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#0e7490" />
    </linearGradient>
    <filter id="neon-glow-logo" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  {/* Letter V */}
  <g filter="url(#neon-glow-logo)">
    <path
      d="M 35 25 L 60 75 L 85 25"
      fill="none"
      stroke="white"
      stroke-width="12"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  {/* Letter C */}
  <g filter="url(#neon-glow-logo)">
    <path
      d="M 125 30 A 25 25 0 1 0 125 70"
      fill="none"
      stroke="url(#neon-primary)"
      stroke-width="12"
      stroke-linecap="round"
    />
    <path
      d="M 125 30 A 25 25 0 1 0 125 70"
      fill="none"
      stroke="white"
      stroke-width="2"
      stroke-linecap="round"
      opacity="0.5"
    />
  </g>
</svg>
</div>
</body>
</html>
